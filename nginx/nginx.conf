worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include conf/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name www.eliotech.top eliotech.top;

        root D:/Tiktok/frontend/dist;
        index index.html;

        # 直接服务静态资源（/app/assets/ 路径）
        location ~ ^/app/assets/(.*)$ {
            try_files /assets/$1 =404;
        }

        # 直接服务 favicon
        location ~ ^/app/favicon\.svg$ {
            try_files /favicon.svg =404;
        }

        # 直接服务根目录静态资源
        location ~ ^/app/[^/]+\.(svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
            try_files $uri =404;
        }

        # 前端 SPA 路由 - 所有其他 /app/* 请求返回 index.html
        location /app/ {
            try_files $uri $uri/ /index.html;
        }

        # 根路径重定向到 /app/
        location = / {
            return 301 /app/;
        }

        # API 反向代理到后端
        location /api/ {
            proxy_pass http://127.0.0.1:8002/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # SSE/WebSocket 支持
        location /ws {
            proxy_pass http://127.0.0.1:8002/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
